spring:
  application:
    name: ecommerce-3tier

  datasource:
    url: jdbc:mysql://172.31.16.190:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ecommerce_user
    password: ChangeMe@123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          fetch_size: 50
          batch_size: 25
        order_inserts: true
        order_updates: true

  cache:
    type: simple

  memcached:
    host: MC01_PRIVATE_IP
    port: 11211

  rabbitmq:
    host: 172.31.31.182
    port: 5672
    username: ecommerce_user
    password: RabbitPass123!@#
    virtual-host: /
    connection-timeout: 10000

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: 8080
  servlet:
    context-path: /
    session:
      timeout: 30m
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10
  connection-timeout: 20000
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

aws:
  s3:
    bucket-name: ecommerce-dev-ACCOUNT_ID
    region: ap-southeast-2

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    enable:
      all: true

file:
  upload:
    dir: /var/ecommerce/uploads

logging:
  level:
    root: INFO
    com.ecommerce: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  file:
    name: /var/log/ecommerce/application.log