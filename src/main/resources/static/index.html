<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub - Premium E-Commerce</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light: #f8f9fa;
            --dark: #2c3e50;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        .navbar {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .nav-center {
            flex: 1;
            text-align: center;
        }

        .search-bar {
            display: inline-flex;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.3);
            width: 300px;
        }

        .search-bar input {
            background: none;
            border: none;
            color: white;
            width: 100%;
            font-size: 14px;
        }

        .search-bar input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .nav-right {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 24px;
            transition: transform 0.2s;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            box-shadow: var(--shadow);
        }

        .nav-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .nav-btn.logout-btn {
            background: var(--danger);
            border-color: var(--danger);
        }

        .nav-btn.logout-btn:hover {
            background: #c0392b;
        }

        .login-container {
            display: none;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
        }

        .login-container.active {
            display: flex;
        }

        .login-box {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-box h1 {
            color: var(--dark);
            margin-bottom: 10px;
            text-align: center;
            font-size: 32px;
        }

        .login-box .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #f8f9ff;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .demo-text {
            text-align: center;
            color: #95a5a6;
            margin-top: 20px;
            font-size: 13px;
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 12px 25px;
            cursor: pointer;
            font-size: 15px;
            color: #7f8c8d;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            color: var(--primary);
            background: #f8f9ff;
        }

        .tab-btn.active {
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            box-shadow: var(--shadow);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }

        .filter-group select {
            padding: 10px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            background: white;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--danger);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            z-index: 2;
        }

        .product-info {
            padding: 20px;
        }

        .product-category {
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .product-name {
            color: var(--dark);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-description {
            color: #95a5a6;
            font-size: 13px;
            margin-bottom: 15px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .product-stock {
            font-size: 12px;
            color: var(--success);
            font-weight: 600;
            background: #d5f4e620;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .product-rating {
            color: var(--warning);
            font-size: 14px;
            margin-bottom: 12px;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            font-size: 14px;
        }

        .add-to-cart-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow);
        }

        .customers-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .customers-table {
            width: 100%;
            border-collapse: collapse;
        }

        .customers-table thead {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .customers-table th {
            padding: 18px;
            text-align: left;
            font-weight: 700;
            font-size: 14px;
        }

        .customers-table td {
            padding: 15px 18px;
            border-bottom: 1px solid #ecf0f1;
            font-size: 14px;
            color: var(--dark);
        }

        .customers-table tbody tr:hover {
            background: #f8f9ff;
        }

        .customer-avatar {
            display: inline-flex;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 10px;
        }

        .cart-empty {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .empty-message {
            color: #95a5a6;
            margin-bottom: 30px;
        }

        .continue-shopping-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }

        .cart-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .cart-items-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .cart-item {
            display: flex;
            gap: 20px;
            padding: 20px;
            border-bottom: 1px solid #ecf0f1;
            align-items: center;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-image {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .quantity-control {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #f8f9fa;
            width: fit-content;
            padding: 5px;
            border-radius: 8px;
        }

        .quantity-control button {
            width: 30px;
            height: 30px;
            border: none;
            background: white;
            cursor: pointer;
            border-radius: 5px;
            font-weight: 700;
            color: var(--primary);
            transition: all 0.2s;
        }

        .quantity-control button:hover {
            background: var(--primary);
            color: white;
        }

        .quantity-control input {
            width: 50px;
            text-align: center;
            border: none;
            background: transparent;
            font-weight: 700;
        }

        .remove-btn {
            background: #ffe5e5;
            color: var(--danger);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
        }

        .remove-btn:hover {
            background: var(--danger);
            color: white;
        }

        .cart-summary {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .summary-row.total {
            border-top: 2px solid #ecf0f1;
            padding-top: 15px;
            font-size: 18px;
            font-weight: 700;
            color: var(--dark);
        }

        .checkout-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--success) 0%, #229954 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .checkout-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .order-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }

        .order-id {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
        }

        .order-date {
            color: #95a5a6;
            font-size: 12px;
        }

        .order-status {
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-completed {
            background: #d5f4e6;
            color: var(--success);
        }

        .order-items {
            margin-bottom: 20px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 8px;
        }

        .order-total {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            text-align: right;
            padding-top: 15px;
            border-top: 2px solid #ecf0f1;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 18px;
            color: #95a5a6;
        }

        .error {
            background: #fadbd8;
            color: var(--danger);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }

            .search-bar {
                width: 100%;
            }

            .cart-container {
                grid-template-columns: 1fr;
            }

            .cart-summary {
                position: static;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="navbar" id="navbar">
        <div class="navbar-brand">🛍️ ShopHub</div>
        <div class="nav-center">
            <div class="search-bar">
                <input type="text" placeholder="Search products..." id="searchInput">
            </div>
        </div>
        <div class="nav-right">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <span id="username" style="font-size: 14px;">Welcome</span>
            </div>
            <div class="cart-icon" onclick="switchTab('cart')">
                🛒
                <span class="cart-badge" id="cart-count" style="display: none;">0</span>
            </div>
            <button class="nav-btn logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="login-container active" id="loginSection">
        <div class="login-box">
            <h1>🛍️ ShopHub</h1>
            <p class="subtitle">Premium Shopping Experience</p>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username-input" value="anusha" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password-input" value="password123" placeholder="Enter your password">
            </div>
            <button class="login-btn" onclick="login()">Login to ShopHub</button>
            <p class="demo-text">Demo: anusha / password123</p>
        </div>
    </div>

    <div class="content" id="mainContent">
        <div class="container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('products')">🏪 Shop</button>
                <button class="tab-btn" onclick="switchTab('customers')">👥 Customers</button>
                <button class="tab-btn" onclick="switchTab('cart')">🛒 Cart</button>
                <button class="tab-btn" onclick="switchTab('orders')">📦 Orders</button>
            </div>

            <div class="section active" id="products-section">
                <div class="filters">
                    <div class="filter-group">
                        <label>Category:</label>
                        <select onchange="filterProducts()">
                            <option value="">All Categories</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>
                </div>
                <div id="products-error" class="error" style="display:none;"></div>
                <div id="products-loading" class="loading">⏳ Loading amazing products...</div>
                <div class="products-grid" id="products-grid"></div>
            </div>

            <div class="section" id="customers-section">
                <div class="customers-section">
                    <div id="customers-error" class="error" style="display:none;"></div>
                    <div id="customers-loading" class="loading">⏳ Loading customers...</div>
                    <table class="customers-table" id="customers-table" style="display:none;">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Location</th>
                                <th>Member Since</th>
                            </tr>
                        </thead>
                        <tbody id="customers-tbody"></tbody>
                    </table>
                </div>
            </div>

            <div class="section" id="cart-section">
                <div id="cart-container"></div>
            </div>

            <div class="section" id="orders-section">
                <div id="orders-container"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api/v1';
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let orders = JSON.parse(localStorage.getItem('orders')) || [];
        let products = [];

        const productImages = [
            'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&h=500&fit=crop',
            'https://images.unsplash.com/photo-1556656793-08538906a9f8?w=500&h=500&fit=crop',
            'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=500&h=500&fit=crop',
            'https://images.unsplash.com/photo-1591290621749-4127c4e1e4fa?w=500&h=500&fit=crop',
            'https://images.unsplash.com/photo-1612198188060-c7c2a3b66eae?w=500&h=500&fit=crop'
        ];

        function login() {
            const username = document.getElementById('username-input').value;
            const password = document.getElementById('password-input').value;

            if (username && password) {
                localStorage.setItem('user', JSON.stringify({ username, password }));
                document.getElementById('username').textContent = `Welcome, ${username}!`;
                document.getElementById('userAvatar').textContent = username[0].toUpperCase();
                document.getElementById('loginSection').classList.remove('active');
                document.getElementById('mainContent').classList.add('active');
                document.getElementById('navbar').style.display = 'flex';
                updateCartBadge();
                loadProducts();
            }
        }

        function logout() {
            localStorage.removeItem('user');
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('loginSection').classList.add('active');
            document.getElementById('mainContent').classList.remove('active');
            location.reload();
        }

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                document.getElementById('username').textContent = `Welcome, ${user.username}!`;
                document.getElementById('userAvatar').textContent = user.username[0].toUpperCase();
                document.getElementById('loginSection').classList.remove('active');
                document.getElementById('mainContent').classList.add('active');
                document.getElementById('navbar').style.display = 'flex';
                updateCartBadge();
                loadProducts();
            } else {
                document.getElementById('navbar').style.display = 'none';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-section').classList.add('active');
            event.target.classList.add('active');

            if (tab === 'products') loadProducts();
            else if (tab === 'customers') loadCustomers();
            else if (tab === 'cart') displayCart();
            else if (tab === 'orders') displayOrders();
        }

        async function loadProducts() {
            const gridDiv = document.getElementById('products-grid');
            const loadingDiv = document.getElementById('products-loading');
            const errorDiv = document.getElementById('products-error');

            loadingDiv.style.display = 'block';
            gridDiv.innerHTML = '';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/products`);
                if (!response.ok) throw new Error('Failed to load');
                products = await response.json();
                loadingDiv.style.display = 'none';
                displayProducts(products);
            } catch (error) {
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.textContent = `❌ ${error.message}`;
            }
        }

        function displayProducts(prods) {
            const gridDiv = document.getElementById('products-grid');
            gridDiv.innerHTML = prods.map((product, idx) => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${productImages[idx % productImages.length]}" alt="${product.name}">
                        <div class="product-badge">⭐ Best Seller</div>
                    </div>
                    <div class="product-info">
                        <div class="product-category">${product.category}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-rating">★★★★★ (${Math.floor(Math.random() * 500) + 100} reviews)</div>
                        <div class="product-footer">
                            <div class="product-price">$${product.price.toFixed(2)}</div>
                            <div class="product-stock">${product.stock} in stock</div>
                        </div>
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id}, '${product.name}', ${product.price})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadCustomers() {
            const tbodyDiv = document.getElementById('customers-tbody');
            const tableDiv = document.getElementById('customers-table');
            const loadingDiv = document.getElementById('customers-loading');
            const errorDiv = document.getElementById('customers-error');

            loadingDiv.style.display = 'block';
            tableDiv.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/customers`);
                if (!response.ok) throw new Error('Failed to load');
                const customers = await response.json();
                loadingDiv.style.display = 'none';
                tbodyDiv.innerHTML = customers.map(c => `
                    <tr>
                        <td><span class="customer-avatar">${c.first_name[0]}</span>${c.first_name} ${c.last_name}</td>
                        <td>${c.email}</td>
                        <td>${c.phone}</td>
                        <td>${c.city}, ${c.country}</td>
                        <td>Jun 2026</td>
                    </tr>
                `).join('');
                tableDiv.style.display = 'table';
            } catch (error) {
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.textContent = `❌ ${error.message}`;
            }
        }

        function addToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) existing.quantity += 1;
            else cart.push({ id, name, price, quantity: 1 });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            alert(`✅ "${name}" added to cart!`);
        }

        function updateCartBadge() {
            const badge = document.getElementById('cart-count');
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            badge.textContent = total;
            badge.style.display = total > 0 ? 'flex' : 'none';
        }

        function displayCart() {
            const container = document.getElementById('cart-container');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <div class="empty-icon">🛒</div>
                        <div class="empty-title">Your Cart is Empty</div>
                        <div class="empty-message">Add some amazing products to get started!</div>
                        <button class="continue-shopping-btn" onclick="switchTab('products')">Continue Shopping</button>
                    </div>
                `;
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            let html = `<div class="cart-container"><div class="cart-items-section">`;
            cart.forEach((item, idx) => {
                const subtotal = item.price * item.quantity;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-image">
                            <img src="${productImages[idx % productImages.length]}" alt="${item.name}">
                        </div>
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">$${item.price.toFixed(2)} each</div>
                            <div class="quantity-control">
                                <button onclick="updateQuantity(${item.id}, -1)">−</button>
                                <input type="number" value="${item.quantity}" readonly>
                                <button onclick="updateQuantity(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div style="margin-bottom: 10px; font-weight: 700; color: var(--primary);">$${subtotal.toFixed(2)}</div>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">Remove</button>
                        </div>
                    </div>
                `;
            });
            
            html += `</div><div class="cart-summary">
                <div class="summary-title">Order Summary</div>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span>$${total.toFixed(2)}</span>
                </div>
                <div class="summary-row">
                    <span>Shipping:</span>
                    <span>Free</span>
                </div>
                <div class="summary-row">
                    <span>Tax:</span>
                    <span>$${(total * 0.1).toFixed(2)}</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span>$${(total * 1.1).toFixed(2)}</span>
                </div>
                <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
            </div></div>`;
            
            container.innerHTML = html;
        }

        function updateQuantity(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) removeFromCart(id);
                else {
                    localStorage.setItem('cart', JSON.stringify(cart));
                    updateCartBadge();
                    displayCart();
                }
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            displayCart();
        }

        function checkout() {
            if (cart.length === 0) return;
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) * 1.1;
            const order = {
                id: 'ORD-' + Date.now(),
                date: new Date().toLocaleDateString(),
                items: [...cart],
                total: total,
                status: 'Completed'
            };
            
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            alert(`✅ Order placed! Order ID: ${order.id}`);
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartBadge();
            switchTab('orders');
        }

        function displayOrders() {
            const container = document.getElementById('orders-container');
            if (orders.length === 0) {
                container.innerHTML = `<div class="cart-empty"><div class="empty-icon">📦</div><div class="empty-title">No Orders Yet</div></div>`;
                return;
            }
            
            container.innerHTML = `<div class="orders-grid">` + orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">${order.id}</div>
                            <div class="order-date">${order.date}</div>
                        </div>
                        <span class="order-status status-${order.status.toLowerCase()}">${order.status}</span>
                    </div>
                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="order-item">
                                <span>${item.name} x${item.quantity}</span>
                                <span>$${(item.price * item.quantity).toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="order-total">Total: $${order.total.toFixed(2)}</div>
                </div>
            `).join('') + `</div>`;
        }

        function filterProducts() {
            displayProducts(products);
        }

        window.addEventListener('load', checkAuth);
    </script>
</body>
</html>
